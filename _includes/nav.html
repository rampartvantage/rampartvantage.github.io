<!-- _includes/nav.html -->
<header class="site-header">
  <div class="container">

    <a class="site-logo" href="{{ '/' | relative_url }}">
      {{ site.title }}
    </a>

    <nav class="site-nav">
      <ul>
        <li><a href="{{ '/' | relative_url }}"
          {% if page.url == '/' %}class="active"{% endif %}>
          Home
        </a></li>

        <li><a href="{{ '/services' | relative_url }}"
          {% if page.url contains '/services' %}class="active"{% endif %}>
          Services
        </a></li>

        <li><a href="{{ '/blog' | relative_url }}"
          {% if page.url contains '/blog' %}class="active"{% endif %}>
          Blog
        </a></li>

        <li><a href="{{ '/about' | relative_url }}"
          {% if page.url contains '/about' %}class="active"{% endif %}>
          About
        </a></li>

        <li>
          <a href="{{ '/contact' | relative_url }}" class="nav-cta
            {% if page.url contains '/contact' %}active{% endif %}">
            Contact
          </a>
        </li>
      </ul>
    </nav>

  </div>
</header>

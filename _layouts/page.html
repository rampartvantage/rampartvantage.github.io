<!-- _layouts/page.html -->
---
layout: default
---

<article class="page-content">

  {% if page.show_hero %}
  <section class="page-hero">
    <div class="container">
      <h1>{{ page.title }}</h1>
      {% if page.subtitle %}
        <p class="page-subtitle">{{ page.subtitle }}</p>
      {% endif %}
    </div>
  </section>
  {% endif %}

  <section class="page-body">
    <div class="container">
      {{ content }}
    </div>
  </section>

</article>
